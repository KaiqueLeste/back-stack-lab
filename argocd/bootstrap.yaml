---
# Bootstrap Application para instalar os addons automaticamente via ArgoCD
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: addons
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: back-stack
  source:
    repoURL: https://github.com/KaiqueLeste/back-stack-lab.git
    path: addons
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# AppProject para os addons do back-stack
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: back-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Projeto Back-Stack para gestão de infraestrutura e plataforma
  sourceRepos:
    - https://github.com/KaiqueLeste/back-stack-lab.git
    - https://charts.crossplane.io/stable
    - oci://ghcr.io/crossplane-contrib/crossview-chart
    - ghcr.io/crossplane-contrib/crossview-chart
    - ghcr.io/nginx/charts
    - https://kyverno.github.io/kyverno
    - https://helm.localstack.cloud
  destinations:
    - namespace: '*'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
