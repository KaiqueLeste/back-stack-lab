server:
  # Configura o protocolo HTTPS para o Service (solicitado anteriormente)
  service:
    servicePortHttpsAppProtocol: HTTPS

  # Argumento extra para permitir tráfego HTTP vindo do Gateway (SSL Termination)
  extraArgs:
    - --insecure

  # Garante que o Argo CD entenda que está atrás de um proxy
  config:
    application.instanceLabelKey: argocd.argoproj.io/instance

extraObjects:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: back-stack
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: back-stack
      source:
        repoURL: https://github.com/KaiqueLeste/back-stack-lab.git
        path: back-stack
        targetRevision: main
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
  - apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: back-stack
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      description: Projeto Back-Stack para gestão de infraestrutura e plataforma
      sourceRepos:
        - https://github.com/KaiqueLeste/back-stack-lab.git
        - https://charts.crossplane.io/stable
        - oci://ghcr.io/crossplane-contrib/crossview-chart
        - ghcr.io/crossplane-contrib/crossview-chart
        - ghcr.io/nginx/charts
        - https://kyverno.github.io/kyverno
        - https://helm.localstack.cloud
      destinations:
        - namespace: '*'
          server: '*'
      clusterResourceWhitelist:
        - group: '*'
          kind: '*'
      namespaceResourceBlacklist:
        - group: ''
          kind: ResourceQuota
        - group: ''
          kind: LimitRange