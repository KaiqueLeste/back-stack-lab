apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server-route
  namespace: argocd
spec:
  parentRefs:
  - name: shared-gateway
    namespace: gateway-infrastructure
  hostnames:
  - argocd.kleste.lab # Referência ao namespace dedicado
  rules:
  - backendRefs:
    - name: argocd-server
      port: 443