apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: kyverno
  template:
    metadata:
      name: kyverno
      namespace: argocd
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/component: policy
    spec:
      project: back-stack
      source:
        repoURL: https://kyverno.github.io/kyverno
        targetRevision: 3.7.1
        chart: kyverno
        helm:
          releaseName: kyverno
          values: |
            admissionController:
              replicas: 1
            backgroundController:
              replicas: 1
            cleanupController:
              replicas: 1
            reportsController:
              replicas: 1
            rbac:
              create: true
            serviceAccount:
              create: true
      destination:
        server: https://kubernetes.default.svc
        namespace: kyverno
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m