# 1. Criar o namespace dedicado
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-infrastructure
  labels:
    shared-gateway-access: "true" # A label que você mencionou antes
---
# 2. Criar o Gateway centralizado
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway-infrastructure
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: "*.kleste.lab"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            shared-gateway-access: "true"