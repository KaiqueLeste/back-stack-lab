# Endpoint para uso dentro do cluster pelo Crossplane:
# http://ministack.ministack.svc.cluster.local:4566
apiVersion: v1
kind: Service
metadata:
  name: ministack
  namespace: ministack
  labels:
    app.kubernetes.io/name: ministack
    app.kubernetes.io/component: aws-emulation
spec:
  selector:
    app: ministack
  ports:
    - name: aws
      port: 4566
      targetPort: 4566
  type: ClusterIP
